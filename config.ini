[colors]
background = #030303
background-alt = #030303
primary = #899dcc
secondary = #4f628f
alert = #A54242
disabled = #707880

[bar/example]
width = 100%
height = 12pt
radius = 1

; dpi = -96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 1
line-color = #f00

border-size = 0pt
border-color = #fffffff

padding-left = 0
padding-right = 1

module-margin = 1

separator =/
separator-foreground = #242b3b

font-0 = robotomono; 1

modules-left = xworkspaces #xwindow
modules-right = filesystem pulseaudio battery memory cpu wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-foreground = #ffffff
label-active-underline= #DC8CC3
label-active-padding = 1

label-occupied = %name%
label-occupied-foreground = #f4f4f4
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = #363636
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

#[module/filesystem]
#type = internal/fs
#interval = 25
#
#mount-0 =  / 
#
#label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%
#
#label-unmounted = %mountpoint% not mounted
#label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "V "
format-volume-prefix-foreground = #3D3846
format-volume = <label-volume>

label-volume = %percentage%%
label-volume-foreground = #898989
label-muted = "mute"
label-muted-foreground = #890000

[module/battery]
label-full = "full"
label-charging = "batt %percentage%%"
label-discharging = batt %percentage%%

type = internal/battery
full-at = 99
battery = BAT0
adapter = ACAD
format-charging-foreground = #58FF00
format-discharging-foreground = #DC8CC3
format-full-foreground = #E8D116





#[module/xkeyboard]
#type = internal/xkeyboard
#blacklist-0 = num lock

#label-layout = %layout%
#label-layout-foreground = ${colors.primary}

#label-indicator-padding = 2
#label-indicator-margin = 1
#label-indicator-foreground = ${colors.background}
#label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ram  "
format-prefix-foreground = #3D3846
label = %percentage_used:2%%
label-foreground = #898989

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "cpu "
format-prefix-foreground = #3D3846
label = %percentage:2%%
label-foreground = #898989


[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#898989}%essid%

[module/eth]
inherit = 
interface-type = 
label-connected = 



[module/date]
type = internal/date
interval = 1

date = %d.%m.%Y %H:%M

label = %date%
label-foreground = #3D3846



[settings]
screenchange-reload = true
pseudo-transparency = false

; vim:ft=dosini
